                <div>
                    <label class="flavours-box">

                        <span class="flavours">Chocolate</span>
                    </label>
                    <label class="flavours-box">
                        <input type="radio" name="top" value="Blueberry" class="hidden-radio">
                        <span class="flavours">Blueberry</span>
                    </label>
                    <label class="flavours-box">
                        <input type="radio" name="top" value="Raspberry" class="hidden-radio">
                        <span class="flavours">Raspberry</span>
                    </label>
                    <label class="flavours-box">
                        <input type="radio" name="top" value="Crispy" class="hidden-radio">
                        <span class="flavours">Crispy</span>
                    </label>
                    <label class="flavours-box">
                        <input type="radio" name="top" value="Strawberry" class="hidden-radio">
                        <span class="flavours">Strawberry</span>
                    </label>
                    <label class="flavours-box">
                        <input type="radio" name="top" value="Rum & Raisin" class="hidden-radio">
                        <span class="flavours">Rum/Raisin</span>
                    </label>
                    <label class="flavours-box">
                        <input type="radio" name="top" value="Orange" class="hidden-radio">
                        <span class="flavours">Orange</span>
                    </label>
                    <label class="flavours-box">
                        <input type="radio" name="top" value="Lemon" class="hidden-radio">
                        <span class="flavours">Lemon</span>
                    </label>
                    <label class="flavours-box">
                        <input type="radio" name="top" value="Blue Cheese" class="hidden-radio">
                        <span class="flavours">Blue cheese</span>
                    </label>
                </div>
            </div>

            <div class="cupcake-custom-bottom">
                <h2>Bund</h2>
                <div>
                    <label class="flavours-box">
                        <input type="radio" name="bottom" value="Vanilla" class="hidden-radio" th:checked="true">
                        <span class="flavours">Vanilla</span>
                    </label>
                    <label class="flavours-box">
                        <input type="radio" name="bottom" value="Chocolate" class="hidden-radio">
                        <span class="flavours">Chocolate</span>
                    </label>
                    <label class="flavours-box">
                        <input type="radio" name="bottom" value="Nutmeg" class="hidden-radio">
                        <span class="flavours">Nutmeg</span>
                    </label>
                    <label class="flavours-box">

                    </label>
                    <label class="flavours-box">
                        <input type="radio" name="bottom" value="Almond" class="hidden-radio">
                        <span class="flavours">Almond</span>
                    </label>
                </div>
            </div>

        </div>

            <div class="basket-button-web">
                <button form="cupcake-maker" type="submit" class="basket-button" style="background:none; border:none; width:100%;">
                    <h3>Tilføj til kurv</h3>
                </button>
            </div>

        </div>
    </form>
    <div class="side-boxes">
        <div class="basket-list-box">
            <h2>Oversigt</h2>
            <div class="basket-list">
                <th:block class="basket-load-web" th:each="cupcake : ${basketList}">
                    <div class="basket-list-product-box">
                        <div>
                        <div class="first-line-styling">
                            <a class="name-price" th:text="${cupcake.getAmount +' '+ cupcake.getName}"></a>
                            <div class="remove-and-price">
                            <a class="name-price" th:text="${(cupcake.getPrice*cupcake.getAmount) +' kr'}"></a>
<!--                            <a  th:onclick="|window.location.href='@{/renderBasket}'|"-->
<!--                                    type="button">- -->
<!--                            </a>-->
                                <form th:action="@{/removeFromBasketOrder}" method="post">
                                    <input type="hidden" name="cupcakeIdOrder" th:value="${cupcake.getCupcakeId}"/>
                                    <button id="remove-from-basket" type="submit">-</button>
                                </form>
                            </div>
                        </div>
                        <a class="ingredients" th:text="${cupcake.getTop+' '+cupcake.getBottom}"></a>
                        </div>
                    </div>
                </th:block>
            </div>

        </div>
        <hr>
        <a id="total-payment-web" class="name-price" th:text="${getTotalPrice+' kr'}"></a>
        <div class="order-button-box">
            <a id="order-button" th:href="@{/payment}">Bestil</a>
        </div>
    </div>

<div class="basket-button-mobile">
    <h1 class="basket-button">Tilføj til kurv</h1>
</div>

<h1 class="overview-mobile">Oversigt</h1>

<div class="basket-box">
    <th:block class="basket-load-mobile" th:each="cupcake : ${basketList}">
        <div class="basket-list-product-box">
            <div class="first-line-styling">
                <a class="name-price" th:text="${cupcake.getAmount + cupcake.getName}"></a>
                <a class="name-price" th:text="${cupcake.getPrice+' kr'}"></a>
            </div>
            <a class="ingredients" th:text="${cupcake.getTop+' '+cupcake.getBottom}"></a>
            <a></a>
        </div>
    </th:block>

</div>
<div class="checkout-button-mobile">
    <a id="total-payment-mobile" class="name-price" th:text="${getTotalPrice+' kr'}"></a>
</div>
<div class="checkout-button-mobile">
    <h1 class="checkout-button" th:href="@{/payment}">Gå til betaling</h1>
</div>


<footer>
    <p>din@mail.dk</p>
</footer>

<script th:inline="javascript">
    const cupcakeList = /*[[${allCupcakes}]]*/ [];
    const cupcakeNames = {};

    cupcakeList.forEach(c => {
        const trimTop = c.top.split(' (')[0].trim();
        const trimBottom = c.bottom.split(' (')[0].trim();

        const key = trimTop + "|" + trimBottom;

        cupcakeNames[key] = c.name;
    });
</script>
<script src="/js/orderPage.js"></script>
</body>
</html>
